# ==========================================
# Training Configuration (Llama 3.2 3B on Kaggle T4x2)
# ==========================================
#
# Run example:
#   export TRAIN_PER_CLASS=110
#   export TEST_PER_CLASS=20
#   export TRAIN_CONFIG=configs/train_3b_t4x2.yaml
#   python scripts/preprocess_data.py
#   python scripts/train.py
#

# ---------- Model ----------
model_name: "unsloth/Llama-3.2-3B-Instruct-bnb-4bit"
max_seq_length: 512
dtype: null
load_in_4bit: true

# ---------- LoRA ----------
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ---------- Training ----------
per_device_train_batch_size: 2
gradient_accumulation_steps: 16
num_train_epochs: 6
learning_rate: 8.0e-5
optimizer: "adamw_8bit"
weight_decay: 0.01
lr_scheduler_type: "cosine"
warmup_steps: 50
max_grad_norm: 1.0
logging_steps: 10
dataset_num_proc: 2
seed: 42
fp16: true
bf16: false

# ---------- Save ----------
output_dir: "./outputs"
save_strategy: "epoch"

# ---------- Data ----------
train_data_path: "./sample_data/train.csv"
test_data_path: "./sample_data/test.csv"

# ---------- Evaluation generation ----------
eval_max_new_tokens: 12
eval_temperature: 0.0
eval_do_sample: false
