# ==========================================
# Training Configuration
# ==========================================

# ---------- Model ----------
model_name: "unsloth/Llama-3.2-1B-Instruct-bnb-4bit"
max_seq_length: 768            # Tăng để chứa prompt có label list
dtype: null            # auto-detect (float16 / bfloat16)
load_in_4bit: true     # QLoRA 4-bit quantization

# ---------- LoRA ----------
lora_r: 16             # Rank of LoRA matrices
lora_alpha: 16         # Scaling factor
lora_dropout: 0        # Unsloth optimized = 0
target_modules:        # Modules to apply LoRA
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ---------- Training ----------
per_device_train_batch_size: 8
gradient_accumulation_steps: 4     # Effective batch = 8 * 4 = 32
num_train_epochs: 3
learning_rate: 2.0e-4
optimizer: "adamw_8bit"
weight_decay: 0.01
lr_scheduler_type: "linear"
warmup_steps: 10
max_grad_norm: 1.0
logging_steps: 10
seed: 42

# ---------- Save ----------
output_dir: "./outputs"
save_strategy: "epoch"

# ---------- Data ----------
train_data_path: "./sample_data/train.csv"
test_data_path: "./sample_data/test.csv"
