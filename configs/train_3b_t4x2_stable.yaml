# ==========================================
# Stable fallback config for Llama 3.2 3B (Kaggle T4)
# ==========================================
# Use this when OOM / instability appears.

model_name: "unsloth/Llama-3.2-3B-Instruct-bnb-4bit"
max_seq_length: 384
dtype: null
load_in_4bit: true

lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

per_device_train_batch_size: 2
gradient_accumulation_steps: 12
num_train_epochs: 5
learning_rate: 1.0e-4
optimizer: "adamw_8bit"
weight_decay: 0.01
lr_scheduler_type: "cosine"
warmup_steps: 30
max_grad_norm: 1.0
logging_steps: 10
dataset_num_proc: 2
seed: 42
fp16: true
bf16: false

output_dir: "./outputs"
save_strategy: "epoch"

train_data_path: "./sample_data/train.csv"
test_data_path: "./sample_data/test.csv"

eval_max_new_tokens: 12
eval_temperature: 0.0
eval_do_sample: false
