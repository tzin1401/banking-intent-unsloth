# ==========================================
# OPTIMIZED Training Config — Llama 1B (Target 92%+)
# ==========================================
# Run:
#   export TRAIN_PER_CLASS=999
#   export TEST_PER_CLASS=999
#   export TRAIN_CONFIG=configs/train_1b_optimized.yaml
#   python scripts/preprocess_data.py
#   python scripts/train.py

# ---------- Model ----------
model_name: "unsloth/Llama-3.2-1B-Instruct-bnb-4bit"
max_seq_length: 768            # Tăng để chứa prompt có label list
dtype: null
load_in_4bit: true

# ---------- LoRA ----------
lora_r: 64                    # Capacity cao cho 77 classes
lora_alpha: 128               # Scaling = 2.0
lora_dropout: 0.05            # Regularization nhẹ
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ---------- Training ----------
per_device_train_batch_size: 4
gradient_accumulation_steps: 4    # Effective batch = 16
num_train_epochs: 8               # Đủ thời gian converge
learning_rate: 5.0e-5             # LR ổn định
optimizer: "adamw_8bit"
weight_decay: 0.01
lr_scheduler_type: "cosine"       # Smooth convergence
warmup_steps: 100                 # ~6% tổng steps
max_grad_norm: 1.0
logging_steps: 25
dataset_num_proc: 2
seed: 42
fp16: true
bf16: false

# ---------- Save ----------
output_dir: "./outputs"
save_strategy: "epoch"

# ---------- Data ----------
train_data_path: "./sample_data/train.csv"
test_data_path: "./sample_data/test.csv"

# ---------- Evaluation generation ----------
eval_max_new_tokens: 12
eval_temperature: 0.0
eval_do_sample: false
